<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo 2048</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8f7a66">
    <link rel="icon" href="assets/classic/2048.jpg" sizes="192x192">
    <link rel="apple-touch-icon" href="assets/classic/2048.jpg">
</head>
<body>
    <!-- Character/theme selector disabled; classic theme launches by default. -->
    <!--
    <div id="theme-selector" class="theme-selector">
        <div class="theme-selector-content">
            <h1>Choose Character</h1>
            <p class="theme-subtitle">Unlock new themes by reaching 2048.</p>
            <div id="character-list" class="character-list"></div>
            <div id="theme-panel" class="theme-panel hidden">
                <div class="theme-panel-header">
                    <button id="back-to-characters" class="secondary">Back</button>
                    <div class="theme-panel-title">
                        <h2 id="character-name"></h2>
                        <p id="character-tagline"></p>
                    </div>
                </div>
                <div id="theme-list" class="theme-grid"></div>
            </div>
        </div>
    </div>
    -->

    <div id="leaderboard" class="overlay hidden">
        <div class="overlay-content">
            <h1>High Scores</h1>
            <div id="leaderboard-entry" class="leaderboard-entry hidden">
                <p>New high score! Enter your name:</p>
                <div class="leaderboard-form">
                    <input id="player-name" type="text" maxlength="20" autocomplete="name" placeholder="Player name">
                    <button id="save-score">Save</button>
                </div>
            </div>
            <ul id="high-score-list">
                <!-- Scores will be injected here -->
            </ul>
            <div class="overlay-actions">
                <button id="clear-leaderboard" class="secondary">Clear</button>
                <button id="close-leaderboard">Close</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Photo 2048</h1>
            <div class="scores">
                <div class="score-container">0</div>
                <div class="best-container">0</div>
            </div>
            <div class="header-buttons">
                <button id="show-leaderboard">Scores 🏆</button>
                <button id="undo-button" class="undo-button" disabled>Undo ↩️</button>
                <button class="restart-button">New Game</button>
            </div>
        </header>
        
        <div class="game-container">
            <div class="grid-container">
                <!-- Grid cells will be generated here -->
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="tile-container">
                <!-- Tiles will be dynamically added here -->
            </div>
        </div>
        
        <div class="game-message">
            <p></p>
            <div class="game-quote hidden"></div>
            <div class="lower">
                <a class="keep-playing-button">Keep playing</a>
                <a class="retry-button">Try again</a>
            </div>
        </div>
    </div>

    <script src="effects.js"></script>
    <script src="script.js"></script>
</body>
</html>
